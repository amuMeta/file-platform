# file-platform 站点配置
# 容器内路径:/etc/nginx/conf.d/default.conf
# 关键:upstream 是 compose 服务名 "node"(同 fp-net 网络)

server {
    listen 80;
    server_name _;

    # ===== API 反代到 node 容器 =====
    # proxy_pass 带尾斜杠 → nginx 把匹配的 /api/ 替换成 /,即去掉前缀
    # (与 Vite dev proxy 的 rewrite 行为一致,Fastify 路由是 bare 路径)
    location /api/ {
        proxy_pass http://node:3000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== X-Accel-Redirect:大文件零拷贝下发 =====
    # 物理路径必须与 node 容器内 UPLOAD_DIR 解析后的绝对路径一致
    # (node: UPLOAD_DIR=/app/data/uploads → alias /app/data/uploads/)
    location /protected/ {
        internal;                          # 关键:仅 X-Accel-Redirect 内部可用,外部直接 404
        alias /app/data/uploads/;
    }

    # ===== 前端 SPA =====
    location / {
        root  /app/web-dist;
        try_files $uri $uri/ /index.html;
    }
}

