# 文件分发平台 - nginx 配置
# 使用:
#   1) 将 web-dist 替换为前端构建产物的实际绝对路径
#   2) 将 /srv/file-platform/data/uploads 替换为后端 data/uploads 实际绝对路径
#   3) 站点启用 HTTPS(本配置假设 SSL 在别处终止或同 server 块;请按实际调整)
#
# 上传上限:MAX_UPLOAD_MB=500
#  - client_max_body_size 必须 >= 上限(否则 nginx 在请求体未读完就返 413)
#  - proxy_request_buffering off 必须开,否则 nginx 缓冲整个请求到磁盘,
#    浏览器端进度条会卡在 0 直到 nginx 缓冲完才跳到 100%
#  - proxy_read_timeout / proxy_send_timeout 必须足够大,防止慢客户端/慢磁盘被中断

server {
    listen 443 ssl;
    server_name your.domain;

    # 必须 > MAX_UPLOAD_MB(500),留 ~20m buffer
    client_max_body_size 520m;

    ssl_certificate     /etc/nginx/ssl/your.domain.crt;
    ssl_certificate_key /etc/nginx/ssl/your.domain.key;

    # API 请求转发到 Fastify
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 后端从该头取真实 IP 写日志
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # 流式传给上游:避免 nginx 先把整个 body 缓存到磁盘
        # 副作用:上传过程中断网,nginx 不会知道,得靠客户端超时
        proxy_request_buffering off;

        # 长超时:大文件 + 慢网络;30min 够 500MB @ 280KB/s
        proxy_read_timeout  1800s;
        proxy_send_timeout  1800s;
        proxy_connect_timeout 60s;
    }

    # 静态上传文件(仅允许 internal 跳转,外部直接 404)
    location /protected/ {
        internal;  # 关键:仅 X-Accel-Redirect 内部可用
        alias /srv/file-platform/data/uploads/;
    }

    # 前端 SPA
    location / {
        root /srv/file-platform/web-dist;
        try_files $uri $uri/ /index.html;
    }
}

# 如需 HTTP -> HTTPS 跳转:
# server {
#     listen 80;
#     server_name your.domain;
#     return 301 https://$host$request_uri;
# }
